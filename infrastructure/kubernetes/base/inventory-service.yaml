apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: airops360
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: airops360/inventory-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: airops360-app-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: airops360
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8083
      targetPort: 8083

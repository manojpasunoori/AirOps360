apiVersion: apps/v1
kind: Deployment
metadata:
  name: operations-dashboard
  namespace: airops360
spec:
  replicas: 1
  selector:
    matchLabels:
      app: operations-dashboard
  template:
    metadata:
      labels:
        app: operations-dashboard
    spec:
      containers:
        - name: operations-dashboard
          image: airops360/operations-dashboard:latest
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: operations-dashboard
  namespace: airops360
spec:
  selector:
    app: operations-dashboard
  ports:
    - port: 3001
      targetPort: 3001

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cargo-service
  namespace: airops360
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cargo-service
  template:
    metadata:
      labels:
        app: cargo-service
    spec:
      containers:
        - name: cargo-service
          image: airops360/cargo-service:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cargo-service
  namespace: airops360
spec:
  selector:
    app: cargo-service
  ports:
    - port: 8000
      targetPort: 8000

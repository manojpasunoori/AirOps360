apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-service
  namespace: airops360
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-service
  template:
    metadata:
      labels:
        app: flight-service
    spec:
      containers:
        - name: flight-service
          image: airops360/flight-service:latest
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: flight-service
  namespace: airops360
spec:
  selector:
    app: flight-service
  ports:
    - port: 8081
      targetPort: 8081

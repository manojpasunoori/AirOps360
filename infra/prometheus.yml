global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'wms-inventory-service'
    static_configs:
      - targets: ['wms-inventory-service:8081']
    metrics_path: /actuator/prometheus

  - job_name: 'cargo-tracking-service'
    static_configs:
      - targets: ['cargo-tracking-service:8082']
    metrics_path: /actuator/prometheus

  - job_name: 'crew-scheduler-service'
    static_configs:
      - targets: ['crew-scheduler-service:8083']
    metrics_path: /metrics

  - job_name: 'koa-api-gateway'
    static_configs:
      - targets: ['koa-api-gateway:3000']
    metrics_path: /metrics

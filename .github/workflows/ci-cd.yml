name: AirOps360 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/airops360

jobs:

  # ── 1. WMS Inventory Service (Java) ─────────────────────────────
  build-wms:
    name: Build & Test WMS Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        working-directory: services/wms-inventory-service
        run: mvn test --no-transfer-progress

      - name: SonarQube Analysis
        working-directory: services/wms-inventory-service
        run: mvn sonar:sonar -Dsonar.host.url=${{ secrets.SONAR_HOST }} -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      - name: Build JAR
        working-directory: services/wms-inventory-service
        run: mvn package -DskipTests --no-transfer-progress

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: services/wms-inventory-service
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Build & Push Docker Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: services/wms-inventory-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-wms:${{ github.sha }}

  # ── 2. Baggage Worker Service (C#) ──────────────────────────────
  build-baggage:
    name: Build & Test Baggage Worker (C#)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: services/baggage-worker-service
        run: dotnet restore BaggageWorker/BaggageWorker.csproj

      - name: Build
        working-directory: services/baggage-worker-service
        run: dotnet build BaggageWorker/BaggageWorker.csproj --no-restore

      - name: Run NUnit Tests
        working-directory: services/baggage-worker-service
        run: dotnet test BaggageWorker.Tests/ --logger "trx;LogFileName=test-results.trx"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: NUnit Results
          path: '**/test-results.trx'
          reporter: dotnet-trx

      - name: Build & Push Docker Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: services/baggage-worker-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-baggage:${{ github.sha }}

  # ── 3. Crew Scheduler Service (Python) ──────────────────────────
  build-crew:
    name: Build & Test Crew Scheduler (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        working-directory: services/crew-scheduler-service
        run: pip install -r requirements.txt

      - name: Run PyTest
        working-directory: services/crew-scheduler-service
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Build & Push Docker Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: services/crew-scheduler-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-crew:${{ github.sha }}

  # ── 4. KOA API Gateway (Node.js) ────────────────────────────────
  build-gateway:
    name: Build & Test KOA Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/koa-api-gateway/package-lock.json

      - name: Install deps
        working-directory: services/koa-api-gateway
        run: npm ci

      - name: Run Jest Tests
        working-directory: services/koa-api-gateway
        run: npm test

      - name: Build & Push Docker Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: services/koa-api-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }}

  # ── 5. E2E Tests (Playwright + Cucumber) ────────────────────────
  e2e-tests:
    name: E2E & BDD Tests
    runs-on: ubuntu-latest
    needs: [build-wms, build-crew, build-gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Set up Node.js for Playwright
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: tests/e2e-playwright
        run: npm ci && npx playwright install --with-deps

      - name: Run Playwright E2E Tests
        working-directory: tests/e2e-playwright
        run: npx playwright test

      - name: Run Cucumber BDD Tests
        working-directory: tests/bdd-cucumber
        run: npm ci && npm test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e-playwright/playwright-report/

      - name: Tear down
        if: always()
        run: docker compose down

  # ── 6. Deploy to Azure AKS (main branch only) ───────────────────
  deploy:
    name: Deploy to Azure AKS
    runs-on: ubuntu-latest
    needs: [build-wms, build-baggage, build-crew, build-gateway, e2e-tests]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy via ArgoCD
        run: |
          argocd app sync airops360 \
            --server ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --timeout 300

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/wms-inventory-service -n airops360
          kubectl rollout status deployment/crew-scheduler-service -n airops360
          kubectl rollout status deployment/koa-api-gateway -n airops360

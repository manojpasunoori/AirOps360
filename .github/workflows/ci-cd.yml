name: AirOps360 CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  java-services:
    name: Java Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - flight-service
          - warehouse-service
          - inventory-service
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Maven tests
        working-directory: services/${{ matrix.service }}
        run: mvn test --no-transfer-progress

  python-services:
    name: Python Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - cargo-service
          - simulator-service
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: services/${{ matrix.service }}
        run: pytest tests -q

  baggage-worker:
    name: Baggage Worker
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore baggage worker
        working-directory: services/baggage-service
        run: dotnet restore BaggageService.csproj

      - name: Build baggage worker
        working-directory: services/baggage-service
        run: dotnet build BaggageService.csproj --configuration Release --no-restore

  node-services:
    name: Node Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-gateway
            working_directory: services/api-gateway
            install_command: npm install
            verify_command: node --check src/server.js
          - name: operations-dashboard
            working_directory: frontend/operations-dashboard
            install_command: npm install
            verify_command: npm run build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        working-directory: ${{ matrix.working_directory }}
        run: ${{ matrix.install_command }}

      - name: Verify build surface
        working-directory: ${{ matrix.working_directory }}
        run: ${{ matrix.verify_command }}

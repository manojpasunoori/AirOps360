version: '3.9'

services:

  # ── INFRASTRUCTURE ──────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: airops-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - airops-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: airops-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - airops-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: airops-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: airops-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - airops-net

  postgres:
    image: postgres:15-alpine
    container_name: airops-postgres
    environment:
      POSTGRES_USER: airops
      POSTGRES_PASSWORD: airops_secret
      POSTGRES_DB: airops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - airops-net

  mongodb:
    image: mongo:7.0
    container_name: airops-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: airops
      MONGO_INITDB_ROOT_PASSWORD: airops_secret
      MONGO_INITDB_DATABASE: airops_config
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - airops-net

  redis:
    image: redis:7-alpine
    container_name: airops-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass airops_secret
    networks:
      - airops-net

  # ── SERVICES ────────────────────────────────────────────────────

  koa-api-gateway:
    build: ./services/koa-api-gateway
    container_name: airops-koa-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      WMS_SERVICE_URL: http://wms-inventory-service:8081
      CARGO_SERVICE_URL: http://cargo-tracking-service:8082
      CREW_SERVICE_URL: http://crew-scheduler-service:8083
      JWT_SECRET: airops_jwt_secret_local
      REDIS_URL: redis://:airops_secret@redis:6379
    depends_on:
      - redis
      - wms-inventory-service
    networks:
      - airops-net

  wms-inventory-service:
    build: ./services/wms-inventory-service
    container_name: airops-wms
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/airops_db
      SPRING_DATASOURCE_USERNAME: airops
      SPRING_DATASOURCE_PASSWORD: airops_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: airops_secret
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - airops-net

  cargo-tracking-service:
    build: ./services/cargo-tracking-service
    container_name: airops-cargo
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/airops_db
      SPRING_DATASOURCE_USERNAME: airops
      SPRING_DATASOURCE_PASSWORD: airops_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - airops-net

  crew-scheduler-service:
    build: ./services/crew-scheduler-service
    container_name: airops-crew
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: postgresql://airops:airops_secret@postgres:5432/airops_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://:airops_secret@redis:6379
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - airops-net

  baggage-worker-service:
    build: ./services/baggage-worker-service
    container_name: airops-baggage
    ports:
      - "8084:8084"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_CONNECTION: Host=postgres;Database=airops_db;Username=airops;Password=airops_secret
    depends_on:
      - postgres
      - kafka
    networks:
      - airops-net

  notification-service:
    build: ./services/notification-service
    container_name: airops-notification
    ports:
      - "8085:8085"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - airops-net

  react-dashboard:
    build: ./frontend/react-dashboard
    container_name: airops-react
    ports:
      - "3001:3001"
    environment:
      REACT_APP_API_URL: http://localhost:3000
    networks:
      - airops-net

  # ── OBSERVABILITY ───────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: airops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - airops-net

  grafana:
    image: grafana/grafana:latest
    container_name: airops-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: airops_secret
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - airops-net

networks:
  airops-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  grafana_data:

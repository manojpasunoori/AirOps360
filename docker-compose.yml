name: airops360

services:
  postgres:
    image: postgres:16-alpine
    container_name: airops360-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-airops360}
      POSTGRES_USER: ${POSTGRES_USER:-airops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airops_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airops} -d ${POSTGRES_DB:-airops360}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airops360

  redis:
    image: redis:7-alpine
    container_name: airops360-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-airops_secret}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-airops_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airops360

  mongodb:
    image: mongo:7
    container_name: airops360-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-airops}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-airops_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-airops360}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - airops360

  kafka:
    image: bitnami/kafka:3.7
    container_name: airops360-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-29092}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_CLUSTER_ID:-abcdefghijklmnopqrstuv}
      ALLOW_PLAINTEXT_LISTENER: 'yes'
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - airops360

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: airops360-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: airops360-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - airops360

  kafka-init:
    image: bitnami/kafka:3.7
    container_name: airops360-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: 'no'
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic flight.arrival --partitions 3 --replication-factor 1 && \
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic baggage.scan --partitions 3 --replication-factor 1 && \
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic cargo.unload --partitions 3 --replication-factor 1 && \
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic warehouse.receive --partitions 3 --replication-factor 1 && \
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory.update --partitions 3 --replication-factor 1
    networks:
      - airops360

networks:
  airops360:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  kafka_data:
